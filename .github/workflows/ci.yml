# CI: her push ve PR'da projeyi derler ve entegrasyon testlerini koşar.
# Testler gerçek PostgreSQL ister (application-test.yml -> localhost:5433/socialhub_test);
# lokaldeki compose kurulumunun birebir aynısı burada service container ile sağlanır.
# Redis gerekmez: test profili cache.type=none kullanır.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: socialhub_test
          POSTGRES_USER: socialhub
          POSTGRES_PASSWORD: socialhub
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U socialhub -d socialhub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw -B verify

      # Docker imajinin da derlenebildigini dogrula (registry'ye push yok).
      # Buildx + GHA cache: Maven bagimlilik katmani calistirmalar arasi cache'lenir.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: socialhub:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Frontend: tip kontrolu + prod build + nginx imajinin derlenebildigi dogrulanir.
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check and build
        run: npm run build
        working-directory: frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: socialhub-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

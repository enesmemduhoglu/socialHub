# Test profili: testler compose ile ayağa kalkan PostgreSQL'deki ayrı bir
# test veritabanına (socialhub_test) karşı koşar. Şemayı yine Flyway kurar.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/socialhub_test
    username: socialhub
    password: socialhub

  # Testlerde cache kapalı: doğruluk testleri cache gecikmesinden etkilenmesin.
  cache:
    type: none

app:
  rate-limit:
    # Testler aynı IP'den (MockMvc) yüzlerce auth isteği yapar; sınır kapalı tutulur.
    # Rate limit davranışının kendisi RateLimitIntegrationTest'te ayrıca test edilir.
    enabled: false

spring:
  application:
    name: socialhub

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/socialhub}
    username: ${DB_USERNAME:socialhub}
    password: ${DB_PASSWORD:socialhub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Şemayı Flyway yönetir; Hibernate sadece doğrular, değiştirmez.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    # HS256 için en az 256-bit (32+ karakter) secret. Üretimde env ile override edilir.
    secret: ${JWT_SECRET:change-me-in-production-please-use-a-long-random-secret-key}
    # Access token geçerlilik süresi (ms) — varsayılan 1 saat.
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    issuer: socialhub

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.hibernate.SQL: info

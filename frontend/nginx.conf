# SPA + API reverse proxy: tarayıcı tek origin görür, CORS'a gerek kalmaz.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # /api -> backend (compose ağında servis adıyla).
    # X-Forwarded-For: backend'in rate limiter'ı gerçek istemci IP'sini görsün.
    location /api {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: /users/demo gibi rotalarda da index.html dönsün (React Router devralır).
    location / {
        try_files $uri /index.html;
    }

    # Parmak izli (hash'li) asset'ler uzun süre cache'lenebilir.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

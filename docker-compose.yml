services:
  app:
    build: .
    container_name: socialhub-app
    environment:
      # Container aginda servis adlariyla erisilir; postgres icin CONTAINER portu (5432) kullanilir.
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-socialhub}
      DB_USERNAME: ${POSTGRES_USER:-socialhub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-socialhub}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-use-a-long-random-secret-key}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: socialhub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-socialhub}
      POSTGRES_USER: ${POSTGRES_USER:-socialhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socialhub}
    ports:
      # Host'ta native PostgreSQL 17 zaten 5432'yi kullandığı için 5433'e eşliyoruz.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socialhub} -d ${POSTGRES_DB:-socialhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: socialhub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5
    container_name: socialhub-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
